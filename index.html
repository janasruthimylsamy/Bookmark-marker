<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center main-heading mb-4">📑 Bookmark Manager</h1>

        <div class="bookmark-maker-container shadow-lg p-4 rounded">
            <h2 class="form-heading mb-3">Add New Bookmark</h2>
            <form id="bookmarkForm">
                <div class="mb-3">
                    <label for="siteNameInput">Site Name</label>
                    <input type="text" id="siteNameInput" class="form-control" placeholder="Enter site name"/>
                    <p id="siteNameErrMsg" class="error-message"></p>
                </div>
                <div class="mb-3">
                    <label for="siteUrlInput">Site URL</label>
                    <input type="text" id="siteUrlInput" class="form-control" placeholder="https://example.com"/>
                    <p id="siteUrlErrMsg" class="error-message"></p>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-plus"></i> Add Bookmark
                </button>
            </form>
        </div>

        <ul id="bookmarksList" class="bookmarks-list mt-4"></ul>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
